# Manual (workflow_dispatch-only) parkrun refresh into MotherDuck — a spare /
# canary, NOT the scheduler. Scheduled refreshes run via launchd on the Mac
# (see docs/DEPLOY.md § Local scheduled refresh): parkrun's WAF 405-blocks
# GitHub-hosted runners' datacentre IPs, confirmed by the genuine scheduled
# attempt on Sun 19 Jul 2026 (03:39 UK, inside the guard window) failing with
# HTTP 405 while the same code succeeds from a residential IP. The cron
# schedule + London-window guard were removed then; retrieve them from git
# history if runner IPs ever stop being blocked.
#
# Runs the pipeline against md:parkrun_snapshot (the source of truth) and
# commits the regenerated audit CSV back. The hosted app auto-reloads via the
# app's version-marker (data_version) shortly after. Expect HTTP 405 unless
# parkrun's block has lifted — a success here is the signal that GitHub-hosted
# scheduling is viable again.
name: refresh

on:
  workflow_dispatch: {}

# Only push the audit CSV commit; nothing else is written back.
permissions:
  contents: write

concurrency:
  group: scheduled-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pipeline deps
        run: pip install --quiet requests pandas duckdb beautifulsoup4 lxml html5lib

      - name: Refresh MotherDuck (source of truth)
        env:
          PARKRUN_PIPELINE_DB: md:parkrun_snapshot
          motherduck_token: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: python parkrun_pipeline.py refresh

      - name: Commit refreshed audit CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/parkrun_results.csv
          if git diff --cached --quiet; then
            echo "no CSV changes to commit"
          else
            git commit -m "data: manual cloud refresh $(TZ=Europe/London date +%F)"
            git push
          fi
